<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXBUILD | Register</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body.auth-body {
            min-height: 100vh;
            position: relative;
            background-image: url("{{ url_for('static', filename='background.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body.auth-body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        .auth-wrapper {
            position: relative;
            z-index: 1;
        }

        .auth-card {
            width: 380px;
            padding: 32px;
            border-radius: 16px;
            background: rgba(70, 80, 85, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand {
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .tagline {
            color: #d0d0d0;
            font-size: 13px;
            margin: 6px 0 24px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .auth-form input,
        .auth-form select {
            width: 100%;
            padding: 11px 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #8a9599;
            color: #fff;
            font-size: 14px;
        }

        .auth-form input::placeholder {
            color: #ececec;
        }

        .auth-form select {
            color: #fff;
        }

        .primary-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(to right, #f7d794, #f3a683);
            margin-top: 10px;
        }

        .primary-btn:hover {
            opacity: 0.9;
        }

        .auth-footer {
            margin-top: 18px;
            font-size: 13px;
            color: #ddd;
        }

        .link-btn {
            color: #f7d794;
            font-weight: 600;
            text-decoration: none;
            margin-left: 4px;
        }

        .link-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body class="auth-body">

    <div class="auth-wrapper">
        <div class="auth-card">

            <h1 class="brand">NEXBUILD</h1>
            <p class="tagline">Luxury Construction Intelligence Platform</p>

            <!-- 🔥 IMPORTANT: method POST added -->
            <form class="auth-form" method="POST">

                <div class="input-group">
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                </div>

                <div class="input-group">
                    <input type="text" name="company" placeholder="Company Name" required>
                </div>

                <div class="input-group">
                    <select name="role" required>
                        <option disabled selected value="">- Select Position / Role -</option>
                        <option>Business Owner / Founder / CXO</option>
                        <option>Contractor</option>
                        <option>Architect / Interior Designer</option>
                        <option>Project Manager</option>
                        <option>Labour Contractor</option>
                        <option>Site Manager / Supervisor</option>
                        <option>Planning Manager</option>
                        <option>Site Engineer</option>
                        <option>Accountant</option>
                    </select>
                </div>

                <div class="input-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Create Password" required>
                </div>

                <button type="submit" class="primary-btn">Register</button>

            </form>

            <div class="auth-footer">
                <span>Already registered?</span>
                <a href="{{ url_for('login') }}" class="link-btn">Login</a>
            </div>

        </div>
    </div>

</body>
</html>
