<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEXBUILD | Create Project</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background: radial-gradient(circle at top left,#1e293b,#0f172a 70%);
    color:white;
    min-height:100vh;
    padding:60px 20px;
}

/* Animated glow */
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:radial-gradient(circle,rgba(59,130,246,0.5),transparent 70%);
    top:-150px;
    left:-150px;
    filter:blur(120px);
    animation:glowMove 8s infinite alternate ease-in-out;
    z-index:-1;
}

@keyframes glowMove{
    from{transform:translate(0,0);}
    to{transform:translate(120px,80px);}
}

/* Logout */
.logout{
    position:absolute;
    top:30px;
    right:40px;
    padding:10px 20px;
    border-radius:30px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.logout:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px rgba(59,130,246,0.6);
}

/* Card */
.card{
    max-width:750px;
    margin:auto;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
    animation:fadeUp 0.6s ease forwards;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

h2{
    margin-bottom:30px;
    font-weight:600;
}

/* Inputs */
input, select{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
    transition:0.3s;
}

input::placeholder{
    color:#cbd5e1;
}

input:focus, select:focus{
    border:1px solid #3b82f6;
    box-shadow:0 0 15px rgba(59,130,246,0.4);
}

/* Section divider */
.section-title{
    margin:30px 0 15px 0;
    font-weight:600;
    font-size:18px;
    color:#93c5fd;
}

/* Team selection */
.member-box{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
    background:rgba(255,255,255,0.05);
    padding:10px 15px;
    border-radius:12px;
}

.member-box label{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

.member-box select{
    width:180px;
    margin:0;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:40px;
    font-weight:600;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    cursor:pointer;
    transition:0.3s;
    margin-top:15px;
}

button:hover{
    transform:translateY(-4px);
    box-shadow:0 0 20px rgba(59,130,246,0.6);
}

/* Back link */
.back{
    margin-top:25px;
    display:block;
    text-align:center;
    font-size:14px;
    color:#94a3b8;
    text-decoration:none;
    transition:0.3s;
}

.back:hover{
    color:#3b82f6;
}

</style>
</head>

<body>

<a href="{{ url_for('logout') }}" class="logout">Logout</a>

<div class="card">
    <h2>Create New Project</h2>

    <form method="POST">

        <!-- SAFETY: preserve owner identity -->
        <input type="hidden" name="owner_id" value="{{ session['user_id'] }}">

        <input type="text" name="project_name" placeholder="Project Name" required>
        <input type="number" name="total_budget" placeholder="Total Budget" step="0.01" required>
        <input type="number" name="progress_percent" placeholder="Initial Progress (%)" step="0.01" required>

        <div class="section-title">Assign Project Team</div>

        {% for user in users %}
        <div class="member-box">
            <label>
                <input type="checkbox" name="project_members" value="{{ user['id'] }}">
                {{ user['name'] }} ({{ user['role'] }})
            </label>

            <select name="role_{{ user['id'] }}">
                <option value="Contractor">Contractor</option>
                <option value="Site Manager">Site Manager</option>
                <option value="Engineer">Engineer</option>
            </select>
        </div>
        {% endfor %}

        <button type="submit">Create Project</button>
    </form>

    <a class="back" href="{{ url_for('dashboard') }}">
        ← Back to Dashboard
    </a>
</div>

</body>
</html>
